jdk:
  - openjdk17

install:
  - flutter config --no-analytics
  - flutter precache --android
  - flutter build aar --debug
  - flutter build aar --profile
  - flutter build aar --release

build:
  override: true
  env:
    - PUB_CACHE=D:/pub_cache

cache:
  directories:
    - $HOME/.gradle/caches
    - $HOME/.pub-cache